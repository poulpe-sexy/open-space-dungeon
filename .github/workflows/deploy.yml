name: Deploy to GitHub Pages

# Triggers:
#  - every push on main        → build + deploy
#  - manual (workflow_dispatch) → redeploy without pushing code
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN permissions required by the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deployments clobbering each other. Cancel-in-progress is
# `false` so a half-finished deploy gets to complete before a new one starts.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Build (Vite, base=/open-space-dungeon/)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
